spring.application.name=api-gateway
server.port=8080

eureka.client.service-url.defaultZone=http://${EUREKA_SERVER:localhost}:8761/eureka


# Load Balanced Routing (Using service names from Eureka)
spring.cloud.gateway.routes[0].id=product-service
spring.cloud.gateway.routes[0].uri=lb://product-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/product/**, /api/v1/product

# Order Service Route
spring.cloud.gateway.routes[1].id=order-service
spring.cloud.gateway.routes[1].uri=lb://order-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/order/**, /api/v1/order

# Inventory Service Route
spring.cloud.gateway.routes[2].id=inventory-service
spring.cloud.gateway.routes[2].uri=lb://inventory-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/inventory/**, /api/v1/inventory

# User Service Route
spring.cloud.gateway.routes[3].id=user-service
spring.cloud.gateway.routes[3].uri=lb://user-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/user/**, /api/v1/user

# Tracing & Metrics
spring.sleuth.enabled=true
spring.zipkin.enabled=true
spring.zipkin.base-url=http://zipkin:9411
management.endpoints.web.exposure.include=health,metrics,prometheus,gateway
management.endpoint.health.show-details=always

# Swagger Aggregation
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
