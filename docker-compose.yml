version: '3.8'
services:
  discovery-server:
    build: ./discovery-server
    ports:
      - "8761:8761"

  config-server:
    build: ./config-server
    ports:
      - "8888:8888"
    depends_on:
      - discovery-server
    environment:
      - EUREKA_SERVER=discovery-server

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - discovery-server
      - config-server
    environment:
      - EUREKA_SERVER=discovery-server
      - CONFIG_SERVER=config-server

  product-service:
    build: ./product-service
    depends_on:
      - discovery-server
      - config-server
      - redis
    environment:
      - EUREKA_SERVER=discovery-server
      - CONFIG_SERVER=config-server
      - SPRING_REDIS_HOST=redis

  order-service:
    build: ./order-service
    depends_on:
      - discovery-server
      - config-server
      - broker
    environment:
      - EUREKA_SERVER=discovery-server
      - CONFIG_SERVER=config-server

  inventory-service:
    build: ./inventory-service
    depends_on:
      - discovery-server
      - config-server
    environment:
      - EUREKA_SERVER=discovery-server
      - CONFIG_SERVER=config-server

  user-service:
    build: ./user-service
    depends_on:
      - discovery-server
      - config-server
    environment:
      - EUREKA_SERVER=discovery-server
      - CONFIG_SERVER=config-server

  notification-service:
    build: ./notification-service
    depends_on:
      - discovery-server
      - broker
    environment:
      - EUREKA_SERVER=discovery-server

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - api-gateway

  redis:
    image: redis:6.2-alpine
    ports:
      - "6379:6379"

  zipkin:
    image: openzipkin/zipkin
    ports:
      - "9411:9411"

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - product-service
      - order-service
      - inventory-service
      - api-gateway

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  zookeeper:
    image: confluentinc/cp-zookeeper:7.0.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  broker:
    image: confluentinc/cp-kafka:7.0.1
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://broker:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
