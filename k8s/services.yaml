apiVersion: v1
kind: Service
metadata:
  name: product-service
spec:
  ports:
    - port: 8081
      targetPort: 8081
  selector:
    app: product-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
spec:
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: YOUR_DOCKER_USERNAME/product-service:latest
          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://discovery-server:8761/eureka
            - name: SPRING_CONFIG_IMPORT
              value: configserver:http://config-server:8888
          ports:
            - containerPort: 8081
---
