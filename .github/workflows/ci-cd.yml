name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Build with Maven
      run: mvn clean install -DskipTests

    - name: Build Docker Images
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/discovery-server:latest ./discovery-server
        docker build -t ${{ secrets.DOCKER_USERNAME }}/config-server:latest ./config-server
        docker build -t ${{ secrets.DOCKER_USERNAME }}/api-gateway:latest ./api-gateway
        docker build -t ${{ secrets.DOCKER_USERNAME }}/product-service:latest ./product-service
        docker build -t ${{ secrets.DOCKER_USERNAME }}/order-service:latest ./order-service
        docker build -t ${{ secrets.DOCKER_USERNAME }}/inventory-service:latest ./inventory-service
        docker build -t ${{ secrets.DOCKER_USERNAME }}/user-service:latest ./user-service
        docker build -t ${{ secrets.DOCKER_USERNAME }}/notification-service:latest ./notification-service

    - name: Login to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push to Docker Hub
      if: github.event_name != 'pull_request'
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/discovery-server:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/config-server:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/api-gateway:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/product-service:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/order-service:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/inventory-service:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/user-service:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/notification-service:latest
